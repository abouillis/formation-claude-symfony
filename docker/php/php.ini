[PHP]
date.timezone = Europe/Paris
memory_limit = 256M
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 60

[opcache]
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

[apcu]
apc.enable_cli = 1
