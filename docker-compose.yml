services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fluxcommerce_php
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/app.ini
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://fluxcommerce:secret@postgres:5432/fluxcommerce?serverVersion=16&charset=utf8
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fluxcommerce

  nginx:
    image: nginx:1.25-alpine
    container_name: fluxcommerce_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - fluxcommerce

  postgres:
    image: postgres:16-alpine
    container_name: fluxcommerce_postgres
    environment:
      POSTGRES_DB: fluxcommerce
      POSTGRES_USER: fluxcommerce
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fluxcommerce"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fluxcommerce

networks:
  fluxcommerce:
    driver: bridge

volumes:
  postgres_data:
